<!DOCTYPE html>
<html class="scroll-smooth" lang="vi">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" name="viewport" />
  <meta name="theme-color" content="#0D1B3E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RƯỢU - HỮU TUẤN</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link href="responsive.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#0D1B3E",
            accent: "#C5A059",
            "background-light": "#F8F9FA",
            "background-dark": "#080F25",
          },
          fontFamily: {
            display: ["Playfair Display", "serif"],
            sans: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    .hero-gradient {
      background: linear-gradient(rgba(13, 27, 62, 0.7), rgba(13, 27, 62, 0.7)), url('https://images.unsplash.com/photo-1597075687490-8f673c6c17f6?auto=format&fit=crop&q=80&w=2000') no-repeat center center;
      background-size: cover;
    }
    .category-card:hover .category-overlay {
      opacity: 1;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }
    
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Touch optimization */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Better image loading */
    img {
      image-rendering: -webkit-optimize-contrast;
    }
    
    /* Mobile menu animation */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .mobile-menu {
      animation: slideDown 0.3s ease-out;
    }
    
    /* Floating buttons responsive */
    @media (max-width: 768px) {
      .floating-buttons {
        right: 1rem;
        gap: 0.5rem;
      }
      .floating-buttons a, .floating-buttons button {
        width: 3rem;
        height: 3rem;
      }
    }
    
    /* Product card hover effect */
    .product-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    /* Loading skeleton */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    .skeleton {
      animation: shimmer 2s infinite;
      background: linear-gradient(to right, #f0f0f0 4%, #e0e0e0 25%, #f0f0f0 36%);
      background-size: 1000px 100%;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300">
  
  <!-- App Container -->
  <div id="app"></div>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="header-responsive.js"></script>
  <script src="app.js"></script>
  <script src="mobile-enhancements.js"></script>
</body>
</html>
